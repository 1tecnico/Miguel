<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Mochila Digital</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:linear-gradient(135deg,#0a1f44,#142f63);
color:white;
}

header{
background:#081833;
padding:15px;
text-align:center;
font-size:24px;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

input{
padding:10px;
border-radius:6px;
border:none;
margin:5px;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#2d63c8;
color:white;
cursor:pointer;
}

button:hover{
background:#3f7ae6;
}

#app{
display:none;
}

nav{
text-align:center;
margin-top:10px;
}

nav button{
margin:5px;
}

.topbar{
text-align:center;
margin:15px;
}

#pesquisa{
width:250px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.materia{
background:#132d63;
border-radius:12px;
padding:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.4);
}

.materia h3{
text-align:center;
margin:5px;
cursor:text;
}

textarea{
width:100%;
height:80px;
border:none;
border-radius:6px;
padding:5px;
resize:none;
}

/* controle das abas */

#mochila{
display:block;
}

#calculadora{
display:none;
text-align:center;
margin-top:30px;
}

.calc{
display:inline-block;
background:#132d63;
padding:15px;
border-radius:10px;
}

.calc input{
width:180px;
margin-bottom:10px;
text-align:right;
}

.calc button{
width:40px;
margin:3px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login">
<h2>🔒 Mochila Digital</h2>
<input type="password" id="senha" placeholder="Digite a senha">
<button onclick="entrar()">Entrar</button>
<p id="erro"></p>
</div>

<!-- APP -->

<div id="app">

<header>🎒 Minha Mochila Escolar</header>

<nav>
<button onclick="mostrar('mochila')">📚 Mochila</button>
<button onclick="mostrar('calculadora')">🧮 Calculadora</button>
</nav>

<!-- MOCHILA -->

<div id="mochila">

<div class="topbar">
<input id="pesquisa" placeholder="Pesquisar matéria..." onkeyup="buscar()">
</div>

<div class="grid" id="grid"></div>

</div>

<!-- CALCULADORA -->

<div id="calculadora">

<h2>🧮 Calculadora</h2>

<div class="calc">

<input id="display" readonly><br>

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">/</button><br>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('*')">*</button><br>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">-</button><br>

<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>
<button onclick="calcular()">=</button>
<button onclick="add('+')">+</button><br>

<button onclick="limpar()" style="width:180px">Limpar</button>

</div>

</div>

</div>

<script>

/* SENHA */

let senhaCorreta="244m"

function entrar(){

let s=document.getElementById("senha").value

if(s===senhaCorreta){
document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"
}else{
document.getElementById("erro").innerText="Senha incorreta"
}

}

/* NAVEGAÇÃO ENTRE ABAS */

function mostrar(sec){

document.getElementById("mochila").style.display="none"
document.getElementById("calculadora").style.display="none"

document.getElementById(sec).style.display="block"

}

/* CRIAÇÃO DAS 21 MATÉRIAS */

let grid=document.getElementById("grid")

for(let i=1;i<=21;i++){

let nome=localStorage.getItem("nome"+i)||("Matéria "+i)
let conteudo=localStorage.getItem("conteudo"+i)||""

let div=document.createElement("div")
div.className="materia"

div.innerHTML=`
<h3 contenteditable oninput="salvarNome(${i},this)">${nome}</h3>
<textarea oninput="salvarTexto(${i},this)">${conteudo}</textarea>
`

grid.appendChild(div)

}

/* SALVAR NOME */

function salvarNome(i,el){
localStorage.setItem("nome"+i,el.innerText)
}

/* SALVAR CONTEÚDO */

function salvarTexto(i,el){
localStorage.setItem("conteudo"+i,el.value)
}

/* PESQUISA */

function buscar(){

let termo=document.getElementById("pesquisa").value.toLowerCase()
let materias=document.querySelectorAll(".materia")

materias.forEach(m=>{

let nome=m.querySelector("h3").innerText.toLowerCase()

if(nome.includes(termo)){
m.style.display="block"
}else{
m.style.display="none"
}

})

}

/* CALCULADORA */

function add(v){
document.getElementById("display").value+=v
}

function calcular(){

let exp=document.getElementById("display").value

try{

if(exp==="") return

document.getElementById("display").value=eval(exp)

}catch{

document.getElementById("display").value="Erro"

}

}

function limpar(){
document.getElementById("display").value=""
}

</script>

</body>
</html>
