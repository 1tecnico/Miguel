<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Digital Pro</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#0a1f44,#142f63);
color:white;
}

header{
background:#081833;
padding:15px;
text-align:center;
font-size:22px;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

input,textarea{
padding:8px;
border-radius:6px;
border:none;
margin:4px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#2d63c8;
color:white;
cursor:pointer;
}

button:hover{
background:#3f7ae6;
}

#app{
display:none;
}

nav{
text-align:center;
margin:10px;
}

nav button{
margin:4px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
padding:20px;
}

.materia{
background:#132d63;
border-radius:10px;
padding:12px;
box-shadow:0 5px 10px rgba(0,0,0,0.4);
}

textarea{
width:100%;
height:180px;
resize:vertical;
}

.section{
display:none;
padding:20px;
text-align:center;
}

</style>
</head>

<body>

<div id="login">
<h2>🔒 Mochila Digital</h2>
<input type="password" id="senha">
<button onclick="entrar()">Entrar</button>
<p id="erro"></p>
</div>

<div id="app">

<header>🎒 Mochila Escolar</header>

<nav>
<button onclick="mostrar('mochila')">📚 Mochila</button>
<button onclick="mostrar('provas')">📅 Provas</button>
<button onclick="mostrar('notas')">📊 Notas</button>
<button onclick="mostrar('estudo')">🧠 Estudo</button>
<button onclick="mostrar('arquivos')">📂 Arquivos</button>
</nav>

<!-- MOCHILA -->

<div id="mochila" class="section">

<input id="pesquisa" placeholder="Pesquisar matéria..." onkeyup="buscar()">

<br><br>

<input id="novaMateria" placeholder="Nome da nova matéria">
<button onclick="criarMateria()">Adicionar Matéria</button>

<div class="grid" id="grid"></div>

</div>

<!-- PROVAS -->

<div id="provas" class="section">

<h2>Calendário de Provas</h2>

<input type="date" id="dataProva">
<input placeholder="Matéria" id="materiaProva">

<button onclick="addProva()">Adicionar</button>

<ul id="listaProvas"></ul>

</div>

<!-- NOTAS -->

<div id="notas" class="section">

<h2>Gráfico de Notas</h2>

<input id="nota" placeholder="Digite nota">

<button onclick="addNota()">Adicionar</button>

<br><br>

<canvas id="grafico" width="400" height="200"></canvas>

</div>

<!-- ESTUDO -->

<div id="estudo" class="section">

<h2>Modo Estudo</h2>

<textarea id="textoEstudo"></textarea><br>

<button onclick="gerarResumo()">Resumo</button>
<button onclick="gerarPergunta()">Pergunta</button>

<p id="resultado"></p>

</div>

<!-- ARQUIVOS -->

<div id="arquivos" class="section">

<h2>Arquivos</h2>

<input type="file" id="fileInput">

<ul id="listaArquivos"></ul>

</div>

</div>

<script>

/* SENHA */

let senhaCorreta="244m"

function entrar(){

if(senha.value===senhaCorreta){
login.style.display="none"
app.style.display="block"
mostrar("mochila")
}else{
erro.innerText="Senha incorreta"
}

}

/* NAVEGAÇÃO */

function mostrar(sec){

document.querySelectorAll(".section").forEach(s=>{
s.style.display="none"
})

document.getElementById(sec).style.display="block"

}

/* MATÉRIAS */

let grid=document.getElementById("grid")

let totalMaterias=localStorage.getItem("totalMaterias")

if(!totalMaterias){
totalMaterias=21
localStorage.setItem("totalMaterias",21)
}

totalMaterias=parseInt(totalMaterias)

for(let i=1;i<=totalMaterias;i++){

criarMateriaHTML(i)

}

function criarMateriaHTML(i){

let nome=localStorage.getItem("nome"+i)||("Matéria "+i)
let texto=localStorage.getItem("conteudo"+i)||""

let div=document.createElement("div")
div.className="materia"

div.innerHTML=`
<h3 contenteditable oninput="salvarNome(${i},this)">${nome}</h3>
<textarea oninput="salvarTexto(${i},this)">${texto}</textarea>
`

grid.appendChild(div)

}

/* CRIAR NOVA MATÉRIA */

function criarMateria(){

let nome=novaMateria.value.trim()

if(nome==="") return

totalMaterias++

localStorage.setItem("totalMaterias",totalMaterias)
localStorage.setItem("nome"+totalMaterias,nome)

criarMateriaHTML(totalMaterias)

novaMateria.value=""

}

/* SALVAR */

function salvarNome(i,e){
localStorage.setItem("nome"+i,e.innerText)
}

function salvarTexto(i,e){
localStorage.setItem("conteudo"+i,e.value)
}

/* PESQUISA */

function buscar(){

let termo=pesquisa.value.toLowerCase()

document.querySelectorAll(".materia").forEach(m=>{

let nome=m.querySelector("h3").innerText.toLowerCase()

m.style.display=nome.includes(termo)?"block":"none"

})

}

/* PROVAS */

function addProva(){

let data=dataProva.value
let mat=materiaProva.value

if(!data||!mat) return

let li=document.createElement("li")
li.innerText=data+" - "+mat

listaProvas.appendChild(li)

}

/* NOTAS */

let notas=[]
let ctx=grafico.getContext("2d")

function addNota(){

let n=parseFloat(nota.value)

if(isNaN(n)) return

notas.push(n)

desenharGrafico()

}

function desenharGrafico(){

ctx.clearRect(0,0,400,200)

notas.forEach((n,i)=>{

let x=i*40+20
let h=n*15

ctx.fillStyle="blue"
ctx.fillRect(x,200-h,30,h)

})

}

/* ESTUDO */

function gerarResumo(){

let frases=textoEstudo.value.split(".")

resultado.innerText=frases.slice(0,2).join(".")+"."

}

function gerarPergunta(){

let palavras=textoEstudo.value.split(" ")

let chave=palavras[Math.floor(Math.random()*palavras.length)]

resultado.innerText="Explique: "+chave

}

/* ARQUIVOS */

fileInput.addEventListener("change",function(){

let file=this.files[0]

if(!file) return

let li=document.createElement("li")
li.innerText=file.name

listaArquivos.appendChild(li)

})

</script>

</body>
</html>
